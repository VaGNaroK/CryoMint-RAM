name: Build and Release DEB

on:
  push:
    branches:
      - main
    paths:
      - 'src/version.py'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version
        id: extract_version
        run: |
          VERSION=$(grep -h -oP "__version__\s*=\s*[\"']\K[^\"']+" src/*.py | head -n 1)
          if [ -z "$VERSION" ]; then
            VERSION="1.0.1" # Fallback idêntico ao script
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build DEB package
        run: |
          chmod +x scripts/build_deb.sh
          ./scripts/build_deb.sh

      - name: Create Release and Upload DEB
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: CryoMint v${{ env.VERSION }}
          files: cryomint_${{ env.VERSION }}_amd64.deb
          generate_release_notes: true
